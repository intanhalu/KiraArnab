<!DOCTYPE html>
<html>
<head>
  <title>Arnab Game - Register & Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Daftar Pengguna Baru</h2>
  <form id="registerForm" onsubmit="registerUser(event)">
    <input type="text" id="regUsername" placeholder="Nama pengguna" required>
    <input type="password" id="regPassword" placeholder="Kata laluan" required>
    <button type="submit">Daftar</button>
  </form>

  <h2>Login</h2>
  <form id="loginForm" onsubmit="loginUser(event)">
    <input type="text" id="loginUsername" placeholder="Nama pengguna" required>
    <input type="password" id="loginPassword" placeholder="Kata laluan" required>
    <button type="submit">Log Masuk</button>
  </form>

  <script>
    // Simpan pengguna dalam localStorage
    function registerUser(event) {
      event.preventDefault();
      let username = document.getElementById("regUsername").value;
      let password = document.getElementById("regPassword").value;

      // Simpan data pengguna
      let users = JSON.parse(localStorage.getItem("users")) || {};
      if (users[username]) {
        alert("Nama pengguna sudah wujud. Sila pilih nama lain.");
      } else {
        users[username] = password;
        localStorage.setItem("users", JSON.stringify(users));
        alert("Pendaftaran berjaya! Sila log masuk.");
      }
    }

    function loginUser(event) {
      event.preventDefault();
      let username = document.getElementById("loginUsername").value;
      let password = document.getElementById("loginPassword").value;

      let users = JSON.parse(localStorage.getItem("users")) || {};
      if (users[username] && users[username] === password) {
        localStorage.setItem("currentPlayer", username);
        alert("Selamat datang, " + username + "!");
        window.location.href = "game.html"; // pergi ke game page
      } else {
        alert("Login gagal. Sila daftar dahulu atau semak kata laluan.");
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Arnab Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Menghitung Arnab</h2>
  <div id="status">
    Pemain: <span id="playerName"></span> | Nyawa: <span id="lives">3</span> | Masa: <span id="timer">20</span>s | Level: <span id="level">1</span> | Skor: <span id="score">0</span>
  </div>

  <div id="question"></div>
  <input type="number" id="answer" placeholder="Jawapan">
  <button onclick="checkAnswer()">Hantar</button>

  <div id="leaderboard"></div>

  <!-- Library untuk confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
